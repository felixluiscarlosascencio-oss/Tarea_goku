function abrirModal(nombre) {
  const lista = transformaciones[nombre];
  document.getElementById("modal-titulo").textContent = "Transformaciones de " + nombre;

  let html = "<table border='1'><thead><tr><th>Imagen</th><th>Transformación</th><th>KI</th><th>Descripción</th></tr></thead><tbody>";
  lista.forEach(function(t) {
    let imgHtml = t.img ? "<img src='" + t.img + "' width='60'>" : "Sin imagen";
    html += "<tr><td>" + imgHtml + "</td><td>" + t.nombre + "</td><td>" + t.ki + "</td><td>" + t.descripcion + "</td></tr>";
  });
  html += "</tbody></table>";

  document.getElementById("modal-contenido").innerHTML = html;
  document.getElementById("modal").style.display = "block";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e) {
  if (e.target === document.getElementById("modal")) {
    document.getElementById("modal").style.display = "none";
  }
};

function mostrar(lista) {
  let tbody = document.getElementById("tabla");
  tbody.innerHTML = "";
  let contador = 1;
  lista.forEach(function(p) {
    let boton = transformaciones[p.nombre]
      ? "<button onclick=\"abrirModal('" + p.nombre + "')\">Ver</button>"
      : "-";
    tbody.innerHTML += "<tr>" +
      "<td>" + contador + "</td>" +
      "<td><img src='" + p.img + "' width='50'></td>" +
      "<td>" + p.nombre + "</td>" +
      "<td>" + p.raza + "</td>" +
      "<td>" + p.genero + "</td>" +
      "<td>" + p.kiBase + "</td>" +
      "<td>" + p.kiTotal + "</td>" +
      "<td>" + p.afiliacion + "</td>" +
      "<td>" + boton + "</td>" +
      "</tr>";
    contador++;
  });
}

function filtrar() {
  let raza = document.getElementById("raza").value;
  mostrar(raza === "todos" ? personajes : personajes.filter(function(p){ return p.raza === raza; }));
}

mostrar(personajes);
