function mostrar(lista){
    let tabla = document.getElementById("tabla");
    tabla.innerHTML = "";
    let contador = 1;

    lista.forEach(p => {
        tabla.innerHTML += `
        <tr>
            <td>${contador}</td>
            <td><img src="${p.img}" width="50"></td>
            <td>${p.nombre}</td>
            <td>${p.raza}</td>
            <td>${p.genero}</td>
            <td>${p.kiBase}</td>
            <td>${p.kiTotal}</td>
            <td>${p.afiliacion}</td>
        </tr>`;
        contador++;
    });
}

function filtrar(){
    let raza = document.getElementById("raza").value;
    if(raza === "todos"){
        mostrar(personajes);
    } else {
        let filtrados = personajes.filter(p => p.raza === raza);
        mostrar(filtrados);
    }
}
